<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Astro SMP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #030206;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Moving Space Background */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 50% 50%, #0d0b21 0%, #030206 100%);
        }
        .space-bg::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(255, 255, 255, 0.35) 1.5px, transparent 1.5px),
                radial-gradient(circle at 80% 35%, rgba(255, 255, 255, 0.3) 2px, transparent 2px),
                radial-gradient(circle at 35% 75%, rgba(255, 255, 255, 0.25) 1px, transparent 1px);
            background-size: 400px 400px;
            animation: spaceGlow 20s linear infinite;
        }
        @keyframes spaceGlow { 0% { transform: translateY(0); } 100% { transform: translateY(-400px); } }

        /* Card Container */
        .edit-container {
            background: rgba(13, 11, 33, 0.95);
            border: 2px solid #a855f7;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
            text-align: center;
        }

        .title {
            font-size: 26px;
            font-weight: 800;
            color: #a855f7;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
        }

        .subtitle {
            color: #928da3;
            font-size: 13px;
            margin-bottom: 30px;
        }

        /* Avatar Preview Section */
        .avatar-section {
            margin-bottom: 25px;
            position: relative;
            display: inline-block;
        }
        .preview-avatar {
            width: 90px;
            height: 90px;
            border-radius: 12px;
            border: 3px solid #a855f7;
            object-fit: cover;
            background: #221f3b;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        }

        /* Form Controls */
        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            color: #cbd5e1;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.05);
        }
        .input-group input[type="file"] {
            padding: 8px;
            cursor: pointer;
        }

        /* Buttons */
        .btn-flex {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        .btn {
            flex: 1;
            padding: 13px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-save {
            background: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
        }
        .btn-cancel {
            background: #1e1b4b;
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-cancel:hover {
            background: #2e2a78;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="space-bg"></div>

    <div class="edit-container">
        <div class="title">Edit Astro Profile</div>
        <div class="subtitle">Update your personal overlay settings</div>

        <div class="avatar-section">
            <img src="" id="avatarPreview" class="preview-avatar" alt="Profile Preview">
        </div>

        <form id="editProfileForm" onsubmit="saveProfileChanges(event)">
            <div class="input-group">
                <label>Minecraft IGN (Character Username)</label>
                <input type="text" id="editIGN" required oninput="livePreviewMinecraftHead(this.value)">
            </div>

            <div class="input-group">
                <label>Upload Custom Photo (Optional)</label>
                <input type="file" id="editPhoto" accept="image/*" onchange="previewCustomImage(event)">
            </div>

            <div class="input-group">
                <label>Update Password</label>
                <input type="password" id="editPass" placeholder="Enter new or current password" required>
            </div>

            <div class="btn-flex">
                <button type="button" class="btn btn-cancel" onclick="goBack()">Cancel</button>
                <button type="submit" class="btn btn-save" id="saveBtn">Save Changes</button>
            </div>
        </form>
    </div>

    <script>
        let customImageBase64 = null;

        document.addEventListener("DOMContentLoaded", function() {
            const savedUser = localStorage.getItem('astro_user');
            if (!savedUser) {
                alert("You need to log in first!");
                window.location.href = "index.html";
                return;
            }

            const user = JSON.parse(savedUser);
            document.getElementById('editIGN').value = user.name;
            document.getElementById('avatarPreview').src = user.avatar;
            customImageBase64 = user.avatar;

            // Password eka current registered user list eken gannawa
            const allUsers = JSON.parse(localStorage.getItem('astro_registered_users')) || [];
            const matchingUser = allUsers.find(u => u.name.toLowerCase() === user.name.toLowerCase());
            if (matchingUser) {
                document.getElementById('editPass').value = matchingUser.password;
            }
        });

        // Username eka type karaddi automatic avatar change wena eka
        function livePreviewMinecraftHead(username) {
            const fileInput = document.getElementById('editPhoto');
            // Custom file ekak select karala nethnam pamanak live change wenna heduwa
            if (!fileInput.files[0] && username.trim() !== "") {
                const headUrl = `https://mc-heads.net/avatar/${username.trim()}/40`;
                document.getElementById('avatarPreview').src = headUrl;
                customImageBase64 = headUrl;
            }
        }

        // Photo ekak select kalama eka preview wena lofic eka
        function previewCustomImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatarPreview').src = e.target.result;
                    customImageBase64 = e.target.result;
                }
                reader.readAsDataURL(file);
            }
        }

        function goBack() {
            window.location.href = "index.html";
        }

        function saveProfileChanges(event) {
            event.preventDefault();
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.disabled = true;
            saveBtn.innerText = "SAVING...";

            const updatedIGN = document.getElementById('editIGN').value.trim();
            const newPassword = document.getElementById('editPass').value;

            const savedUser = JSON.parse(localStorage.getItem('astro_user'));
            let allUsers = JSON.parse(localStorage.getItem('astro_registered_users')) || [];

            // Parn profile index eka data list eken gannawa
            const currentIdx = allUsers.findIndex(u => u.name.toLowerCase() === savedUser.name.toLowerCase());

            // Active user update configuration
            const updatedLoginSession = {
                name: updatedIGN,
                avatar: customImageBase64
            };

            if (currentIdx !== -1) {
                allUsers[currentIdx].name = updatedIGN;
                allUsers[currentIdx].password = newPassword;
                allUsers[currentIdx].avatar = customImageBase64;
            } else {
                allUsers.push({
                    name: updatedIGN,
                    password: newPassword,
                    avatar: customImageBase64
                });
            }

            // Sync dekama complete sethup karanawa
            localStorage.setItem('astro_user', JSON.stringify(updatedLoginSession));
            localStorage.setItem('astro_registered_users', JSON.stringify(allUsers));

            alert("Profile successfully updated!");
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
